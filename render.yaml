services:
  - type: web
    name: finvise-etf-intelligence
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn etf_dashboard.wsgi --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: TWELVE_DATA_API_KEY
        value: "8d5ca07f09ad4c0f95f1ef9660cec5d2"
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in Render dashboard
